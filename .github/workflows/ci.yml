name: tests

on: [push, pull_request]

jobs:
  safety-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install test dependencies
        run: pip install pandas numpy scipy scikit-learn pyarrow pydantic pytest
      - name: Run safety tests (governor / profit-lock / risk caps)
        run: pytest tests/ -q
